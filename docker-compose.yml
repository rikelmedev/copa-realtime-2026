version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: copa_redis
    ports:
      - '6379:6379'
    networks:
      - copa_network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: copa_rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    networks:
      - copa_network

  postgres:
    image: postgres:15-alpine
    container_name: copa_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - copa_network

  api:
    build: ./api
    container_name: copa_api
    ports:
      - '3000:3000'
    environment:
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      - PORT=3000
    depends_on:
      - redis
      - rabbitmq
    networks:
      - copa_network

  ws-server:
    build: ./ws-server
    container_name: copa_ws
    ports:
      - '3001:3001'
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    depends_on:
      - redis
    networks:
      - copa_network

  worker:
    build: ./worker
    container_name: copa_worker
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      - rabbitmq
      - postgres
    networks:
      - copa_network

networks:
  copa_network:
    driver: bridge

volumes:
  postgres_data:
