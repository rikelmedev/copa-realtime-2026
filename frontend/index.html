<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Copa do Mundo 2026 — Tempo Real</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="top-bar">
    <div class="top-bar__left">
      <span class="top-bar__badge">FIFA</span>
      <span class="top-bar__name">Copa do Mundo 2026</span>
    </div>
    <div class="connection-status">
      <div class="connection-status__dot" id="connDot"></div>
      <span id="connectionLabel">Conectando...</span>
    </div>
  </header>

  <nav class="tabs-nav">
    <button class="tab-btn active" data-tab="jogos">⚽ Jogos</button>
    <button class="tab-btn" data-tab="classificacao">📊 Classificação</button>
    <button class="tab-btn" data-tab="artilheiros">🥇 Artilheiros</button>
  </nav>

  <main class="main-content">

    <!-- JOGOS -->
    <div class="tab-pane active" id="tab-jogos">

      <!-- HERO CARD -->
      <div id="hero"></div>

      <section class="section" id="section-live">
        <div class="section-header">
          <h2 class="section-title"><span class="live-dot"></span> Ao Vivo</h2>
          <span class="section-badge" id="liveCount"></span>
        </div>
        <div id="liveMatches" class="matches-grid">
          <div class="empty-state">Verificando jogos ao vivo...</div>
        </div>
      </section>

      <section class="section" id="section-today">
        <div class="section-header">
          <h2 class="section-title">Hoje</h2>
        </div>
        <div id="todayMatches" class="schedule-list">
          <div class="empty-state">Carregando...</div>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Próximos Jogos</h2>
        </div>
        <div id="upcomingMatches" class="schedule-list">
          <div class="empty-state">Carregando...</div>
        </div>
      </section>

      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Resultados Recentes</h2>
        </div>
        <div id="recentMatches" class="schedule-list">
          <div class="empty-state">Carregando...</div>
        </div>
      </section>

    </div>

    <!-- CLASSIFICAÇÃO -->
    <div class="tab-pane" id="tab-classificacao">
      <div id="standings" class="standings-container">
        <div class="empty-state">Carregando classificação...</div>
      </div>
    </div>

    <!-- ARTILHEIROS -->
    <div class="tab-pane" id="tab-artilheiros">
      <section class="section">
        <div class="section-header">
          <h2 class="section-title">Artilheiros da Copa 2026</h2>
        </div>
        <div id="scorers" class="scorers-container">
          <div class="empty-state">Carregando artilheiros...</div>
        </div>
      </section>
    </div>

  </main>

  <!-- Match Detail Modal -->
  <div id="matchModal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal">
      <button class="modal__close" onclick="document.getElementById('matchModal').classList.remove('show')">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <div id="golOverlay" class="gol-overlay">
    <div class="gol-overlay__content">
      <div class="gol-overlay__text">GOL!</div>
      <div class="gol-overlay__sub" id="golOverlaySub"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
